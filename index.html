<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    ul { list-style-type: none; padding: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid #ccc; }
    button { margin-left: 10px; }
    .completed { text-decoration: line-through; color: grey; }
  </style>
</head>
<body>
  <h1>Lista de Tareas</h1>
  <input type="text" id="taskInput" placeholder="Nueva tarea">
  <button id="addTaskBtn">Agregar</button>

  <div>
    <button id="showAll">Mostrar todas</button>
    <button id="showCompleted">Completadas</button>
    <button id="showPending">Pendientes</button>
  </div>

  <ul id="taskList"></ul>

  <script type="module" src="app.js"></script>
</body>
</html>
